# Build and push two Docker images to Docker Hub when a version tag (v*) is pushed.
# Semantic-release (release.yml) pushes the tag after CI passes; this runs on that tag push.
# Set GitHub repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
#
# Postgres (expects external DB): <user>/id:<version> and :latest
# Standalone SQLite (pull and run): <user>/id:<version>-standalone and :standalone
#
# Images are scanned with Grype before push; push is skipped if critical/high vulns are found.

name: Docker Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Postgres image (no push)
        id: build-postgres
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/id:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Postgres image (Grype)
        uses: anchore/scan-action@v7
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}
          fail-build: true
          severity-cutoff: high

      - name: Push Postgres image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/id:latest

      - name: Build standalone image (no push)
        id: build-standalone
        uses: docker/build-push-action@v6
        with:
          context: .
          target: standalone
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}-standalone
            ${{ secrets.DOCKERHUB_USERNAME }}/id:standalone
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan standalone image (Grype)
        uses: anchore/scan-action@v7
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}-standalone
          fail-build: true
          severity-cutoff: high

      - name: Push standalone image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}-standalone
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/id:standalone
