# Build and push two Docker images to Docker Hub on release (tag v*).
# Set GitHub repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
#
# Postgres (expects external DB): <user>/id:<version> and :latest
# Standalone SQLite (pull and run): <user>/id:<version>-standalone and :standalone

name: Docker Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push (Postgres)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/id:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (standalone SQLite)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: standalone
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}-standalone
            ${{ secrets.DOCKERHUB_USERNAME }}/id:standalone
          cache-from: type=gha
          cache-to: type=gha,mode=max
