# Build and push two Docker images when Release workflow completes.
# (Semantic-release creates the tag via the API, so push: tags never fires.)
# Set GitHub repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
#
# Postgres (expects external DB): <user>/id:<version> and :latest
# Standalone SQLite (pull and run): <user>/id:<version>-standalone and :standalone
#
# Images are scanned with Grype before push; push is skipped only if critical vulns are found.

name: Docker Publish

on:
  workflow_run:
    workflows: [ Release ]
    types: [ completed ]
    branches: [ main ]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Get latest version tag
        id: version
        run: |
          git fetch origin 'refs/tags/v*:refs/tags/v*' 2>/dev/null || true
          TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$TAG" ]; then echo "No v* tag found"; exit 1; fi
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Checkout at tag
        uses: actions/checkout@v6
        with:
          ref: v${{ steps.version.outputs.VERSION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Postgres image (no push)
        id: build-postgres
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/id:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Postgres image (Grype)
        uses: anchore/scan-action@v7
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}
          fail-build: true
          severity-cutoff: critical

      - name: Push Postgres image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/id:latest

      - name: Build standalone image (no push)
        id: build-standalone
        uses: docker/build-push-action@v6
        with:
          context: .
          target: standalone
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}-standalone
            ${{ secrets.DOCKERHUB_USERNAME }}/id:standalone
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan standalone image (Grype)
        uses: anchore/scan-action@v7
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}-standalone
          fail-build: true
          severity-cutoff: critical

      - name: Push standalone image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/id:${{ steps.version.outputs.VERSION }}-standalone
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/id:standalone
